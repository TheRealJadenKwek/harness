<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="styles.css">
  <title>Harness Code</title>
</head>
<body>
  <div class="app">

    <!-- Sidebar: the session list -->
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="brand">⬡ Harness</div>
        <button id="newBtn" class="icon-btn" title="New chat (⌘N)">＋</button>
      </div>
      <div id="sessionList" class="session-list"></div>
      <div class="side-foot">
        <button id="settingsBtn" class="side-foot-btn">⚙ Settings</button>
      </div>
    </aside>

    <!-- Center: chat -->
    <div class="center">
      <header class="titlebar">
        <button id="sideToggle" class="icon-btn" title="Toggle sidebar (⌘B)">☰</button>
        <div class="ctx">
          <button id="dirBtn" class="chip" title="Working directory">📁 <span id="dirLabel">…</span></button>
          <button id="modelBtn" class="chip" title="Model (⌘K)">◆ <span id="modelLabel">…</span></button>
          <button id="modeBtn" class="chip mode" title="Permission mode (⇧Tab)">🔨 Ask</button>
        </div>
        <div class="spacer"></div>
        <span id="usageLabel" class="usage" title="Session tokens · estimated cost"></span>
        <button id="diffToggle" class="icon-btn" title="Changes panel (⌘D)">±</button>
      </header>

      <main id="logs" class="logs"></main>

      <footer class="composer-wrap">
        <div id="queueNote" class="queue-note" style="display:none"></div>
        <div id="popup" class="popup" style="display:none"></div>
        <div class="composer">
          <textarea id="input" rows="1" placeholder="Ask anything — @ to mention a file, / for commands…"></textarea>
          <button id="sendBtn" class="send" title="Send (Enter)">↑</button>
          <button id="stopBtn" class="send stop" style="display:none" title="Stop (Esc)">■</button>
        </div>
      </footer>
    </div>

    <!-- Right: git changes panel -->
    <aside class="diffbar" id="diffPanel" style="display:none">
      <div class="diff-head">
        <span class="diff-title">Changes</span>
        <span id="gitBranch" class="git-branch"></span>
        <div class="spacer"></div>
        <button id="gitRefresh" class="icon-btn" title="Refresh">⟳</button>
        <button id="diffClose" class="icon-btn" title="Close">✕</button>
      </div>
      <div id="gitFiles" class="git-files"></div>
      <div id="gitDiffView" class="git-diff-view"></div>
    </aside>
  </div>

  <!-- Model search overlay -->
  <div id="modelSheet" class="sheet" style="display:none">
    <div class="sheet-inner">
      <input id="modelSearch" placeholder="Search or type any model id…" autocomplete="off">
      <div class="row" style="justify-content:space-between;align-items:center">
        <div id="modelCount" class="muted"></div>
        <button id="modelRefresh" class="mini-btn" title="Re-fetch the catalog">⟳ refresh</button>
      </div>
      <div id="modelList" class="model-list"></div>
      <button class="sheet-close" id="modelClose">Done</button>
    </div>
  </div>

  <!-- Settings overlay -->
  <div id="settingsSheet" class="sheet" style="display:none">
    <div class="sheet-inner">
      <h3>Settings</h3>
      <label>OpenRouter API key</label>
      <input id="keyInput" type="password" placeholder="sk-or-…" autocomplete="off">
      <p class="muted">Stored locally on this Mac. Bootstrapped from your harness key if present.</p>
      <div class="row" style="justify-content:space-between">
        <button id="sessionsFolderBtn" class="sheet-close">Open sessions folder</button>
        <div class="row">
          <button id="keySave" class="primary">Save</button>
          <button id="settingsClose" class="sheet-close">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Approval modal -->
  <div id="approvalModal" class="modal" style="display:none">
    <div class="modal-inner">
      <div class="modal-title">Approve <span id="apKind"></span>?<span id="apSession" class="ap-session"></span></div>
      <div id="apWarn" class="ap-warn" style="display:none">⚠ Destructive — this can delete or overwrite files. It stops here even in Auto mode.</div>
      <pre id="apDetail" class="ap-detail"></pre>
      <div class="row">
        <button id="apDeny" class="danger">Deny (Esc)</button>
        <button id="apAllow" class="primary">Allow (⏎)</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
