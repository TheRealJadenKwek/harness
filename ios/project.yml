name: ClaudeHarness
options:
  bundleIdPrefix: com.jadenkwek
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: RLC58VS9R6
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ClaudeHarness:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
      - path: Shared
    dependencies:
      - target: HarnessWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jadenkwek.harness
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        TARGETED_DEVICE_FAMILY: "1"    # iPhone-only (target-level: XcodeGen's per-target default "1,2" overrides project-level)
      configs:
        Debug:                                       # dev builds (devicectl) -> sandbox push
          CODE_SIGN_ENTITLEMENTS: Sources/ClaudeHarness.entitlements
        Release:                                     # TestFlight / App Store -> production push
          CODE_SIGN_ENTITLEMENTS: Sources/ClaudeHarnessRelease.entitlements
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Harness
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: com.jadenkwek.harness
            CFBundleURLSchemes: [harness]
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: Connect to your Mac's Claude/Codex harness over Tailscale.
        NSCameraUsageDescription: Take a photo to attach to your message to Claude/Codex.
        NSMicrophoneUsageDescription: Dictate messages to Claude/Codex with the mic button.
        NSSpeechRecognitionUsageDescription: Transcribe your dictation into the message box (on-device when available).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  HarnessWidgets:                                    # Live Activity (lock screen + Dynamic Island)
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jadenkwek.harness.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Harness
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
