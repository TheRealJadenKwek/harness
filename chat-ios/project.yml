name: HarnessChat
packages:
  MLXLibraries:
    url: https://github.com/ml-explore/mlx-swift-examples
    exactVersion: 2.29.1
options:
  bundleIdPrefix: com.jadenkwek
  deploymentTarget:
    iOS: "17.0"
targets:
  HarnessChat:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: MLXLibraries
        product: MLXLLM
      - package: MLXLibraries
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jadenkwek.harnesschat
        DEVELOPMENT_TEAM: RLC58VS9R6
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "4"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Sources/HarnessChat.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Harness Chat
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        CFBundleDisplayName: Harness Chat
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes: [harnesschat]
            CFBundleURLName: com.jadenkwek.harnesschat.auth
        NSCameraUsageDescription: Take a photo to send to the model.
        NSPhotoLibraryUsageDescription: Attach photos to your messages.
